# Arbitrary depth can be used for input file

# Special keywords:
# casename - specifies the case name and looks for casename.hdf5 for restore
# species - must be specified to allow array allocation
# grid - must be specified to allow grid allocation
# userdifffname: HDF5 file contaning user-specified spatial diffusivities
# radialdifffname: HDF5 file contaning user-specified radial diffusivities
# NOTE: each variable can only be defined once per section


casename: 'nomol'
savefile: 'nomol.hdf5'
restart: 1


species:
    ngsp: 2 # Variable depends on options
    nhsp: 2 # Variable depends on options
    nhgsp: 1 # Variable depends on options
    isimpon: 6
    nzsp:
        0: 6 # Index depends on options, variable depends on options

grid:
    mhdgeo: 1
    gengrid: 0
    geometry: "snull"
    isnonog: 1
    isgriduehdf5: 1
    GridFileName: "gridue.hdf5"

# Create group necessary for inital allocation?

physics:
    minu:
        0: 2
    ziin:
        0: 1
    znuclin:
        0: 1
    cngtgx: 0
    cngtgy: 0

solver:
    lenpfac: 200
    lenplufac: 800
    lfililut: 600

boundaryconditions:
    iflcore: 1
    pcoree: 5.e+5
    pcorei: 5.e+5
    isupcore:
        0: 1
    isnicore:
        0: 0
    curcore:
        0: 1
    isextrnpf: 0
    isnwconi:
        0: 3
    lyni: [0.05, 0.05]
    nwimin:
        0: 1.e+16
    isextrnw: 0
    isnwcono:
        0: 3
    nwomin:
        0: 1.e+15
    isextrtpf: 0
    isextrtw: 0
    istepfc: 3
    lyte: [0.05, 0.05]
    istipfc: 3
    lyti: [0.05, 0.05]
    istewc: 3
    istiwc: 3
    isupss: 1
    isplflxl: 1
    isybdryog: 1

atoms:
    ineudif: 2
    minu:
        1: 2
    ziin:
        1: 0
    znuclin:
        1: 1
    istgcon:
        0: 0
    tgas:
        0: 0
    isnicore:
        1: 0
    isngcore:
        0: 0
    albedoc:
        0: 1 # If isngcore=0
    ngcore:
        0: 2.e+13 # If isngore=1
    isupcore:
        1: 1
    istgcore:
        0: 1
    tgcore:
        0: 100 # If istgcore=1
    tgwall:
        0: 4.e-2 
    isnwconi:
        1: 0
    ifluxni: 1
    isnwcono:
        1: 0
    cfloxiplt: 1
    ingb: 2
    ngbackg:
        0: 1.e+10
    cngfx: 1
    cngfy: 1
    cngflox:
        0: 1
    cngfloy:
        0: 1
    xstscal: 0.02
    ngscal: 1
    xgscal: 0.01
    cngmom: 0
    cmwall: 0
    cfbgt: 0
    kxn: 0
    kyn: 0
    tg:
        istgon:
            0: 1
        cftiexclg: 0.  # Remove the Tg part in the Ti equation
        cfdiss: 1.0
        istgcore:
            0: 2 #..albedo
        istgpfc:
            0: 4
        istgwc:
            0: 4
        istglb:
            0: 4
        istgrb:
            0: 4
        recyce: 0.3
        cfnidhgy: 1.0
        cfnidhg2: 1.0
        cfnidhdis: 1.0 #..consider drift heating for dissociation
        cfnidhmol: 1.0 #..ignore molecular v in dissociation drift heating

rates:
    istabon: 10
    isrtndep: 1 # Only used if istabon=16
    icnucx: 0
    cnucx: 0 # Only used if icnucx=1
    icnuiz: 0
    cnuiz: 0 # Only used if icnuiz=1
    isrecmon: 1
    cfrecom: 1 # Only used if 
    eion: 5
    ediss: 10

carbon:
    mcfilename: 
        0: "C_rates.adas" # Only if ismctab=2
    isrtndep: 1 # Only if ismctab=2
    iscxfit: 2
    ziin:
        2: [1, 2, 3, 4, 5, 6]
    minu:
        2: [12, 12, 12, 12, 12, 12]
    znuclin:
        2: [6, 6, 6, 6, 6, 6]
    isnicore:
        2: [3, 3, 3, 3, 3, 3]
    ncore:
        2: [7.e+19, 7.e+19, 7.e+19, 7.e+19, 7.e+19, 7.e+19]
    curcore: 
        2: [0, 0, 0, 0, 0, 0] # Only if isnicore=1
    isupcore:
        2: [1, 1, 1, 1, 1, 1]
    isngcore:
        1: 0
    ngcore:
        1: 1.e+15 # Only if isngcore=1
    isnwcono:
        2: [3, 3, 3, 3, 3, 3]
    nwomin:
        2: [1.e+7, 1.e+7, 1.e+7, 1.e+7, 1.e+7, 1.e+7]
    isnwconi:
        2: [3, 3, 3, 3, 3, 3]
    nwimin:
        2: [1.e+7, 1.e+7, 1.e+7, 1.e+7, 1.e+7, 1.e+7]
    tgwall:
        1: 4.e-2
    isbohmms: 0
    n0:
        2: [1.e+17, 1.e+17, 1.e+17, 1.e+17, 1.e+17, 1.e+17]
    n0g:
        1: 1.e+18
    nzbackg: 1.e+10
    inzb: 2
    ngbackg:
        1: 1.e8 #1.e+10
    ismctab: 2
    rcxighg:
        1: 0
    kelighg:
        1: 5.e-16
    kelighg:
        1: 5.e-16
    isch_sput:
        1: 7
    fchemygwi: 1
    fchemygwo: 1
    fchemylb: 1
    fchemyrb: 1
    isph_sput:
        1: 3
    crmb: 2
    cizb: 1
    fphysylb: 1
    fphysyrb: 1
    isi_sputw:
        1: 2
    isi_sputpf:
        1: 2
    t_wall: 300
    t_plat: 300


diffusivities:
    kxe: 1
    kxi: 1
    parvis:
        0: 1
    fcdif: 0
    isbohmcalc: 0
    inbtdif: 0
    inbpdif: 0
    kyev: False
    kyiv: False
    difniv: False
    travisv: False


fluxlim:
    flalfv: 1
    flalfe: 0.21
    flalfi: 0.21
    flalfgx: 1
    flalfgy: 1
    flalfgxy: 1
    flalftgx: 1
    flalftgy: 1
    flalfvgx: 1.e+20
    flalfvgy: 1.e+20
    flalfvgxy: 1.e+20
    lgmax: [0.5, 0.2, 0.5, 0.5, 0.5, 0.5] 
    lgtmax: 0.1
    lgvmax: 0.1

differencing:
    methn: 33
    methu: 83
    methe: 33
    methi: 33
    methg: 66
    methp: 33 

drifts:
    newbcl: 1
    newbcr: 1
    b0: 1
    rsigpl: 1.e-8
    cfjhf: 1
    cfjve: 1
    cfjpy: 0
    cfjp2: 0
    isfdiax: 1
    cfqydbo: 1
    cfydd: 0
    cf2dd: 0
    cftdd: 1
    cfyef: 1
    cftef: 1
    cf2ef: 1
    cfybf: 1
    cf2bf: 1
    cfqybf: 1
    cfq2bf: 1
    cfqybbo: 0
    cfniybbo: 0
    cfeeybbo: 0
    cfniydbo: 1
    cfeeydbo: 1
    cfeixdbo: 1
    cfeexdbo: 1
    #isfniycbozero: 
    #    0: 1
    cfqym: 1

potential:
    isnewpot: 1
    rnewpot: 1
    iphibcc: 3 # Only active is isnewpot=1
    isutcore: 0 # Onlt if iphibcc not in [1, 2, 3]
    iphibcwi: 0
    iphibcwo: 0

equations:
    isnion: [1, 1, 1, 1, 1, 1, 1, 1]
    isngon: [0, 1, 1]
    cnfx: 1
    cnfy: 1
    cnsor: 1
    cnurn: 1
    cngsor: 1
    cnurg: 1
    isupon: [1, 1, 1, 1, 1, 1, 1, 1]
    isupgon: [1, 0, 0]
    cmfx: 1
    cmfy: 1
    cpgx: 1
    cnuru: 1
    isteon: 1
    istion: 1
    cfvisx: 1
    cfvisy: 1
    cvgp: 1
    cnure: 1
    cnuri: 1
    isphion: 1
    isphiofft: 0

recycling:
    bcen: 0
    bcenw: 0
    recycp: [1, 1.e-10]
    recycw: [1, 1.e-10]
    albedolb: [0.99, 1]
    albedorb: [0.99, 1]
    recycm: -0.5
    nwsor:      4
    #           WALL, H WALL, C PUFF, H
    issorlb:    [1,     1,      1]
    igspsoro:   [1,     2,      1] 
    igaso:      [0,     0,      495]
    xgaso:      [0,     0,      2.7]
    wgaso:      [1.e+3, 1.e+3,  1.2] 
    albdso:     [1,     1,      1] 
    matwso:     [1,     1,      1] 
    igspsori:   [1,     2,      2] 
    igasi:      [0,     0,      0] 
    xgasi:      [0,     0,      0] 
    wgasi:      [1.e+3, 1.e+3,  1.e+3] 
    albdsi:     [1,     1,      1]
    matwsi:     [1,     1,      1]

commands:
    # Enable cell-by-cell albedos
    - self.populate()
    - bbb.albedo_by_user = 1
    # Set up pumping
    - bbb.recypf_use[-12:,0] = -0.1 # Convective fluxes
    - bbb.albedoi[-12:] = 0.9 # Thermal fluxes
    # vacuum model
    - bbb.isvacuummodel[0] = 1
    - bbb.cfteleout = 1.0
    - exec(open('./readin_telematrix.py').read())
    # updated settings
    - bbb.cfbackg[0] = 100.
    - bbb.ngbackg[0] = 1.e10
    - bbb.cfbackg[1] = 100.
    - bbb.ngbackg[1] = 1.e8
    - bbb.iswflxlgy = 0
    - bbb.iswflxltgy = 0
    - bbb.iswflxlvgy = 0

